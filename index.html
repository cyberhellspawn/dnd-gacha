<script>

let jugador=""
let pity=0
let tipoCofre="normal"

let objetos={normal:[],valentine:[]}

let inventario={}

let stats={
tiradas:0,
epicos:0,
historial:[]
}

const jugadoresImg={
Mal:"img/Mal.png",
Lio:"img/Lio.png",
PERGO:"img/PERGO.png",
Haz:"img/Haz.png"
}

const cofres={
normal:{
imagen:"img/chest.png",
comun:"img/candy.png",
raro:"img/hat.png",
epico:"img/explosion.png",
sonido:"open",
sonidoEpico:"epic",
fondo:"#f5e6c8"
},

valentine:{
imagen:"img/heartbox.png",
comun:"img/hand.png",
raro:"img/star.png",
epico:"img/heart.png",
sonido:"paper",
sonidoEpico:"kiss",
fondo:"#ffe6f0"
}
}

function login(){

let nombre=document.getElementById("nombre").value
if(nombre=="") return

jugador=nombre

document.getElementById("fotoJugador").src=jugadoresImg[jugador]
document.getElementById("player").innerText=jugador

document.getElementById("perfil").style.display="block"
document.getElementById("login").style.display="none"

if(jugador=="Haz"){

document.getElementById("dmPanel").style.display="block"
cargarInventariosDM()

}else{

document.getElementById("game").style.display="block"
cargarInventario()
cargarStats()

}

}

function cambiarCofre(tipo){

tipoCofre=tipo

document.getElementById("cofre").src=cofres[tipo].imagen

document.body.style.background=cofres[tipo].fondo

}

function tirar(num){

if(objetos[tipoCofre].length==0){
alert("Los objetos aún no cargan")
return
}

let tabla=document.getElementById("resultadoTabla")

tabla.innerHTML=`<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripcion</th>
</tr>`

for(let i=0;i<num;i++){

stats.tiradas++

let rareza=rollRareza()

let lista=objetos[tipoCofre].filter(o=>o.rareza==rareza)

let obj=lista[Math.floor(Math.random()*lista.length)]

mostrarResultado(rareza,obj,tabla)

agregarInventario(obj.nombre)

if(rareza=="epico") stats.epicos++

stats.historial.push({
jugador:jugador,
rareza:rareza,
objeto:obj.nombre,
fecha:new Date().toLocaleString()
})

}

guardarInventario()
guardarStats()

}

function rollRareza(){

pity++

if(pity>=30){
pity=0
return"epico"
}

let r=Math.random()*100

if(r<2){pity=0;return"epico"}
if(r<20)return"raro"

return"comun"

}

function mostrarResultado(rareza,obj,tabla){

let fila=document.createElement("tr")

fila.innerHTML=`
<td><img src="${cofres[tipoCofre][rareza]}" width="40"> ${rareza}</td>
<td>${obj.nombre}</td>
<td>${obj.descripcion}</td>
`

tabla.appendChild(fila)

crearParticulas(rareza)

if(rareza=="epico"){
document.getElementById(cofres[tipoCofre].sonidoEpico).play()
}else{
document.getElementById(cofres[tipoCofre].sonido).play()
}

animarCofre()

}

function animarCofre(){

let cofre=document.getElementById("cofre")

cofre.classList.add("abriendo")

setTimeout(()=>{
cofre.classList.remove("abriendo")
},400)

}

function crearParticulas(rareza){

let simbolo="✨"
if(rareza=="raro") simbolo="⭐"
if(rareza=="epico") simbolo="💥"

for(let i=0;i<8;i++){

let p=document.createElement("div")
p.className="particula"
p.innerHTML=simbolo

p.style.left=(window.innerWidth/2+Math.random()*100-50)+"px"
p.style.top="200px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

function agregarInventario(nombre){

if(!inventario[nombre]){
inventario[nombre]=0
}

inventario[nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Objeto</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

function guardarInventario(){

localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))

}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){
inventario=JSON.parse(data)
actualizarTabla()
}

}

function guardarStats(){

localStorage.setItem("stats_"+jugador,JSON.stringify(stats))

}

function cargarStats(){

let data=localStorage.getItem("stats_"+jugador)

if(data){
stats=JSON.parse(data)
}

}

async function cargarCSV(){

let normal=await fetch("list/common.csv").then(r=>r.text())
let valentine=await fetch("list/valentine.csv").then(r=>r.text())

objetos.normal=parseCSV(normal)
objetos.valentine=parseCSV(valentine)

}

function parseCSV(data){

let lineas=data.trim().split("\n")
lineas.shift()

return lineas.map(l=>{
let p=l.split(",")
return{
rareza:p[0].toLowerCase(),
nombre:p[1],
descripcion:p[2]
}
})

}

function cargarInventariosDM(){

let jugadores=["Mal","Lio","PERGO"]

let tabla=document.getElementById("dmTabla")

tabla.innerHTML=`
<tr>
<th>Foto</th>
<th>Jugador</th>
<th>Tiradas</th>
<th>Epicos</th>
<th>Suerte</th>
</tr>
`

let ranking=[]

jugadores.forEach(j=>{

let data=localStorage.getItem("stats_"+j)

if(!data) return

let s=JSON.parse(data)

let suerte=(s.epicos/s.tiradas*100)||0

ranking.push({nombre:j,suerte:suerte})

let fila=document.createElement("tr")

fila.innerHTML=`
<td><img src="${jugadoresImg[j]}" width="60"></td>
<td>${j}</td>
<td>${s.tiradas}</td>
<td>${s.epicos}</td>
<td>${suerte.toFixed(2)}%</td>
`

tabla.appendChild(fila)

})

ranking.sort((a,b)=>b.suerte-a.suerte)

}

cargarCSV()

document.getElementById("dmPanel").style.display="none"

</script>
