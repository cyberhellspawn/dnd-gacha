<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Official Gaoth Gacha</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#336b8a;
}

#login{margin-top:40px}

#perfil img{
width:120px;
border-radius:50%;
border:3px solid white;
}

#game{display:none}

#dmPanel{display:none}

#cofre{
width:200px;
cursor:pointer;
transition:transform 0.4s
}

.abriendo{
transform:scale(1.2) rotate(5deg)
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:85%;
background:white
}

td,th{
border:1px solid #999;
padding:8px 14px
}

.particula{
position:absolute;
font-size:24px;
animation:subir 1s ease-out forwards
}

@keyframes subir{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-100px)}
}

.playerCard{
display:inline-block;
margin:20px;
padding:10px;
background:white;
border-radius:10px;
width:200px;
}

.playerCard img{
width:80px;
border-radius:50%;
}

</style>
</head>

<body>

<h1>Gaoth Gacha</h1>

<h3>Probabilidades</h3>
<p>Epico 2% | Raro 18% | Comun 80%</p>

<div id="login">

<select id="nombre">
<option value="">Selecciona jugador</option>
<option value="Mal">Mal</option>
<option value="Lio">Lio</option>
<option value="PERGO">PERGO</option>
<option value="Haz">DM Haz</option>
</select>

<button onclick="login()">Entrar</button>

</div>

<div id="perfil" style="display:none">
<img id="fotoJugador">
<h3 id="player"></h3>
</div>

<div id="game">

<button onclick="cambiarCofre('normal')">Cofre Normal</button>
<button onclick="cambiarCofre('valentine')">Cofre Valentine</button>

<br><br>

<img id="cofre" src="img/chest.png">

<br><br>

<button onclick="tirar(1)">Abrir x1</button>
<button onclick="tirar(10)">Abrir x10</button>

<h2>Resultado</h2>

<table id="resultadoTabla">
<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripcion</th>
</tr>
</table>

<hr>

<h2>Inventario</h2>

<table id="inventarioTabla">
<tr>
<th>Objeto</th>
<th>Cantidad</th>
</tr>
</table>

</div>

<!-- PANEL DM -->

<div id="dmPanel">

<h2>Panel Dungeon Master</h2>

<div id="statsJugadores"></div>

<h2>🏆 Ranking de Suerte</h2>

<table id="rankingTabla">
<tr>
<th>Jugador</th>
<th>% Épicos</th>
</tr>
</table>

<h2>📜 Historial de Tiradas</h2>

<table id="historialTabla">
<tr>
<th>Jugador</th>
<th>Rareza</th>
<th>Objeto</th>
<th>Fecha</th>
</tr>
</table>

</div>

<audio id="open" src="sound/open.mp3"></audio>
<audio id="epic" src="sound/epic.mp3"></audio>
<audio id="paper" src="sound/paper.mp3"></audio>
<audio id="kiss" src="sound/kiss.mp3"></audio>

<script>

let jugador=""
let pity=0
let tipoCofre="normal"

let objetos={normal:[],valentine:[]}
let inventario={}

const jugadoresImg={
Mal:"img/Mal.png",
Lio:"img/Lio.png",
PERGO:"img/PERGO.png",
Haz:"img/Haz.png"
}

const cofres={
normal:{
imagen:"img/chest.png",
comun:"img/candy.png",
raro:"img/hat.png",
epico:"img/explosion.png",
sonido:"open",
sonidoEpico:"epic",
fondo:"#f5e6c8"
},
valentine:{
imagen:"img/heartbox.png",
comun:"img/hand.png",
raro:"img/star.png",
epico:"img/heart.png",
sonido:"paper",
sonidoEpico:"kiss",
fondo:"#ffe6f0"
}
}

function login(){

let nombre=document.getElementById("nombre").value
if(nombre=="")return

jugador=nombre

document.getElementById("fotoJugador").src=jugadoresImg[jugador]
document.getElementById("player").innerText=jugador

document.getElementById("perfil").style.display="block"
document.getElementById("login").style.display="none"

if(jugador=="Haz"){

document.getElementById("dmPanel").style.display="block"
cargarPanelDM()

}else{

document.getElementById("game").style.display="block"
cargarInventario()

}

}

function registrarHistorial(rareza,objeto){

let data=localStorage.getItem("historial_"+jugador)
let historial=data?JSON.parse(data):[]

historial.push({
rareza:rareza,
objeto:objeto,
fecha:new Date().toLocaleString()
})

localStorage.setItem("historial_"+jugador,JSON.stringify(historial))

}

function tirar(num){

if(objetos[tipoCofre].length==0){
alert("Objetos no cargados")
return
}

let tabla=document.getElementById("resultadoTabla")

tabla.innerHTML=`<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripcion</th>
</tr>`

for(let i=0;i<num;i++){

let rareza=rollRareza()

let lista=objetos[tipoCofre].filter(o=>o.rareza==rareza)

let obj=lista[Math.floor(Math.random()*lista.length)]

mostrarResultado(rareza,obj,tabla)

agregarInventario(obj.nombre)

registrarHistorial(rareza,obj.nombre)

}

guardarInventario()

}

function rollRareza(){

pity++

if(pity>=30){
pity=0
return"epico"
}

let r=Math.random()*100

if(r<2){pity=0;return"epico"}
if(r<20)return"raro"

return"comun"

}

function mostrarResultado(rareza,obj,tabla){

let fila=document.createElement("tr")

fila.innerHTML=`
<td><img src="${cofres[tipoCofre][rareza]}" width="40"> ${rareza}</td>
<td>${obj.nombre}</td>
<td>${obj.descripcion}</td>
`

tabla.appendChild(fila)

crearParticulas(rareza)

if(rareza=="epico"){
document.getElementById(cofres[tipoCofre].sonidoEpico).play()
}else{
document.getElementById(cofres[tipoCofre].sonido).play()
}

animarCofre()

}

function cambiarCofre(tipo){

tipoCofre=tipo

document.getElementById("cofre").src=cofres[tipo].imagen
document.body.style.background=cofres[tipo].fondo

}

function animarCofre(){

let cofre=document.getElementById("cofre")

cofre.classList.add("abriendo")

setTimeout(()=>{
cofre.classList.remove("abriendo")
},400)

}

function crearParticulas(rareza){

let simbolo="✨"
if(rareza=="raro")simbolo="⭐"
if(rareza=="epico")simbolo="💥"

for(let i=0;i<8;i++){

let p=document.createElement("div")
p.className="particula"
p.innerHTML=simbolo

p.style.left=(window.innerWidth/2+Math.random()*100-50)+"px"
p.style.top="200px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

function agregarInventario(nombre){

if(!inventario[nombre]) inventario[nombre]=0

inventario[nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Objeto</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

function guardarInventario(){
localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))
}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){
inventario=JSON.parse(data)
actualizarTabla()
}

}

async function cargarPanelDM(){

let jugadores=["Mal","Lio","PERGO"]

let statsDiv=document.getElementById("statsJugadores")
statsDiv.innerHTML=""

let ranking=[]

jugadores.forEach(j=>{

let historial=JSON.parse(localStorage.getItem("historial_"+j)||"[]")

let total=historial.length
let epicos=historial.filter(h=>h.rareza=="epico").length

let porcentaje= total? ((epicos/total)*100).toFixed(1):0

ranking.push({jugador:j,p:porcentaje})

statsDiv.innerHTML+=`
<div class="playerCard">
<img src="${jugadoresImg[j]}">
<h3>${j}</h3>
<p>📊 Tiradas: ${total}</p>
<p>⭐ Epicos: ${epicos}</p>
</div>
`

let tabla=document.getElementById("historialTabla")

historial.forEach(h=>{

tabla.innerHTML+=`
<tr>
<td>${j}</td>
<td>${h.rareza}</td>
<td>${h.objeto}</td>
<td>${h.fecha}</td>
</tr>
`

})

})

ranking.sort((a,b)=>b.p-a.p)

let tablaRank=document.getElementById("rankingTabla")

ranking.forEach(r=>{

tablaRank.innerHTML+=`
<tr>
<td>${r.jugador}</td>
<td>${r.p}%</td>
</tr>
`

})

}

async function cargarCSV(){

let normal=await fetch("list/common.csv").then(r=>r.text())
let valentine=await fetch("list/valentine.csv").then(r=>r.text())

objetos.normal=parseCSV(normal)
objetos.valentine=parseCSV(valentine)

}

function parseCSV(data){

let lineas=data.trim().split("\n")
lineas.shift()

return lineas.map(l=>{
let p=l.split(",")
return{
rareza:p[0].toLowerCase(),
nombre:p[1],
descripcion:p[2]
}
})

}

cargarCSV()

</script>

</body>
</html>
