<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gaoth Gacha</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

#game{
display:none;
}

.chest{
width:120px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.chest:hover{
transform:scale(1.1);
}

.result{
margin-top:20px;
font-size:20px;
}

</style>

</head>
<body>

<h1>Gaoth Gacha</h1>

<h3>Probabilidades</h3>
<p>Épico 2% | Raro 18% | Común 80%</p>

<div id="login">

<input id="nombre" placeholder="nombre jugador">
<button onclick="login()">Entrar</button>

</div>


<div id="game">

<h2 id="player"></h2>

<h3>Selecciona un cofre</h3>

<img src="img/chest.png" class="chest" onclick="abrirCofre('common')">
<img src="img/heartbox.png" class="chest" onclick="abrirCofre('valentine')">

<div class="result" id="resultado"></div>

</div>

<script>

let jugador=""

let items={
comun:[],
raro:[],
epico:[]
}


function login(){

jugador=document.getElementById("nombre").value

if(jugador=="")return

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("player").innerText="Jugador: "+jugador

}


async function cargarCSV(ruta){

let response=await fetch(ruta)
let data=await response.text()

let lineas=data.split("\n")

for(let i=1;i<lineas.length;i++){

let col=lineas[i].split(",")

let rareza=col[0]?.trim()
let nombre=col[1]?.trim()
let desc=col[2]?.trim()

if(!rareza)return

let obj={
nombre:nombre,
desc:desc
}

items[rareza].push(obj)

}

}


async function cargarDatos(){

await cargarCSV("list/common.csv")
await cargarCSV("list/valentine.csv")

console.log(items)

}

cargarDatos()



function abrirCofre(tipo){

if(tipo=="common") document.body.style.background="#2f4f4f"
if(tipo=="valentine") document.body.style.background="#5a1a2f"

let r=Math.random()*100

let rareza="comun"

if(r<2) rareza="epico"
else if(r<20) rareza="raro"


let lista=items[rareza]

if(lista.length==0){

document.getElementById("resultado").innerText="No hay objetos cargados"

return

}

let premio=lista[Math.floor(Math.random()*lista.length)]

mostrarResultado(rareza,premio)

}


function mostrarResultado(rareza,obj){

let icon="img/candy.png"

if(rareza=="raro") icon="img/hat.png"
if(rareza=="epico") icon="img/explosion.png"

document.getElementById("resultado").innerHTML=

"<img src='"+icon+"' width=80><br>"+
"<b>"+obj.nombre+"</b><br>"+
obj.desc

}

</script>

</body>
</html>
