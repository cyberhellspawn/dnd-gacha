<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Official Gaoth Gacha</title>

<style>
body{font-family:Arial;text-align:center;background:#336b8a}

#login{margin-top:40px}

#perfil img{
width:150px;
border-radius:50%;
border:3px solid white;
}

#game{display:none}
#dmPanel{display:none}

#cofre{
width:200px;
cursor:pointer;
transition:transform 0.4s
}

.abriendo{
transform:scale(1.2) rotate(5deg)
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:80%;
background:white
}

td,th{
border:1px solid #999;
padding:8px 14px
}

.particula{
position:absolute;
font-size:24px;
animation:subir 1s ease-out forwards
}

@keyframes subir{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-100px)}
}
</style>
</head>

<body>

<h1>Gaoth Gacha</h1>

<h3>Probabilidades</h3>
<p>Epico 2% &nbsp;&nbsp; Raro 18% &nbsp;&nbsp; Comun 80%</p>

<div id="login">
<select id="nombre">

<option value="">Selecciona jugador</option>
<option value="Mal">Mal</option>
<option value="Lio">Lio</option>
<option value="PERGO">PERGO</option>
<option value="Haz">DM Haz</option>

</select>

<button onclick="login()">Entrar</button>
</div>

<div id="perfil" style="display:none">
<img id="fotoJugador">
<h3 id="player"></h3>
</div>


<!-- PANEL JUGADOR -->
<div id="game">

<button onclick="cambiarCofre('normal')">Cofre Normal</button>
<button onclick="cambiarCofre('valentine')">Cofre Valentine</button>

<br><br>

<img id="cofre" src="img/chest.png">

<br><br>

<button onclick="tirar(1)">Abrir x1</button>
<button onclick="tirar(10)">Abrir x10</button>

<h2>Resultado</h2>

<table id="resultadoTabla">
<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripcion</th>
</tr>
</table>

<hr>

<h2>Inventario</h2>

<table id="inventarioTabla">
<tr>
<th>Objeto</th>
<th>Cantidad</th>
</tr>
</table>

</div>


<!-- PANEL DM -->
<div id="dmPanel">

<h2>Panel del Dungeon Master</h2>

<table id="dmTabla">

<tr>
<th>Jugador</th>
<th>Objeto</th>
<th>Cantidad</th>
</tr>

</table>

</div>


<audio id="open" src="sound/open.mp3"></audio>
<audio id="epic" src="sound/epic.mp3"></audio>
<audio id="paper" src="sound/paper.mp3"></audio>
<audio id="kiss" src="sound/kiss.mp3"></audio>

<script>

let jugador=""
let pity=0
let tipoCofre="normal"

let inventario={}

const jugadoresImg={
Mal:"img/Mal.png",
Lio:"img/Lio.png",
PERGO:"img/PERGO.png",
Haz:"img/Haz.png"
}

function login(){

let nombre=document.getElementById("nombre").value
if(nombre=="")return

jugador=nombre

document.getElementById("fotoJugador").src=jugadoresImg[jugador]
document.getElementById("player").innerText=jugador

document.getElementById("perfil").style.display="block"
document.getElementById("login").style.display="none"

if(jugador=="Haz"){

document.getElementById("dmPanel").style.display="block"
cargarInventariosDM()

}else{

document.getElementById("game").style.display="block"
cargarInventario()

}

}


function cargarInventariosDM(){

let tabla=document.getElementById("dmTabla")

let jugadores=["Mal","Lio","PERGO"]

jugadores.forEach(j=>{

let data=localStorage.getItem("inventario_"+j)

if(!data)return

let inv=JSON.parse(data)

for(let item in inv){

let fila=document.createElement("tr")

fila.innerHTML=`
<td>${j}</td>
<td>${item}</td>
<td>${inv[item]}</td>
`

tabla.appendChild(fila)

}

})

}


function agregarInventario(nombre){

if(!inventario[nombre]){
inventario[nombre]=0
}

inventario[nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Objeto</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

function guardarInventario(){
localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))
}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){
inventario=JSON.parse(data)
actualizarTabla()
}

}

</script>

</body>
</html>
