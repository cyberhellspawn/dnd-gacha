<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Official Gaoth Gacha</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#336b8a;
}

/* LOGIN */

#login{
margin-top:40px;
}

/* PERFIL */

#perfil{
position:absolute;
top:10px;
right:10px;
text-align:center;
}

#perfil img{
width:70px;
border-radius:50%;
border:3px solid white;
}

/* JUEGO */

#game{
display:none;
}

/* COFRE */

#cofre{
width:200px;
cursor:pointer;
transition:transform 0.4s;
}

.abriendo{
transform:scale(1.2) rotate(5deg);
}

/* TABLAS */

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #999;
padding:8px 14px;
}

/* PARTICULAS */

.particula{
position:absolute;
font-size:24px;
animation:subir 1s ease-out forwards;
}

@keyframes subir{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-100px)}
}

</style>
</head>

<body>

<h1>Official Gaoth Gacha</h1>

<h3>Probabilidades</h3>
<p>Epico 2% &nbsp;&nbsp;&nbsp; Raro 18% &nbsp;&nbsp;&nbsp; Comun 80%</p>

<!-- LOGIN -->

<div id="login">

<select id="nombre">

<option value="">Selecciona jugador</option>
<option value="Mal">Mal</option>
<option value="Lio">Lio</option>
<option value="PERGO">PERGO</option>
<option value="Haz">DM Haz</option>

</select>

<button onclick="login()">Entrar</button>

</div>


<!-- PERFIL -->

<div id="perfil" style="display:none">

<img id="fotoJugador">
<div id="player"></div>

</div>


<!-- JUEGO -->

<div id="game">

<br>

<button onclick="cambiarCofre('normal')">Cofre Normal</button>

<br><br>

<img id="cofre" src="img/chest.png">

<br><br>

<button onclick="tirar(1)">Abrir x1</button>
<button onclick="tirar(10)">Abrir x10</button>

<hr>

<h2>Resultados</h2>

<table id="tablaResultados">

<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripción</th>
</tr>

</table>

<hr>

<h2>Catálogo</h2>

<table>

<tr>
<th>Rareza</th>
<th>Objeto</th>
<th>Descripción</th>
</tr>

<tr>
<td><img src="img/candy.png" width="50"></td>
<td>Caramelo</td>
<td>Dulce común encontrado en cofres</td>
</tr>

<tr>
<td><img src="img/hat.png" width="50"></td>
<td>Sombrero</td>
<td>Objeto raro de colección</td>
</tr>

<tr>
<td><img src="img/explosion.png" width="50"></td>
<td>Explosión</td>
<td>Poder épico devastador</td>
</tr>

</table>

<hr>

<h2>Inventario</h2>

<table id="inventarioTabla">

<tr>
<th>Objeto</th>
<th>Cantidad</th>
</tr>

</table>

</div>

<audio id="open" src="sound/open.mp3"></audio>
<audio id="epic" src="sound/epic.mp3"></audio>

<script>

let jugador=""
let pity=0

const jugadoresImg={

Mal:"img/Mal.png",
Lio:"img/Lio.png",
PERGO:"img/PERGO.png",
Haz:"img/Haz.png"

}

const objetos={

comun:{
nombre:"Caramelo",
img:"img/candy.png",
desc:"Dulce común encontrado en cofres"
},

raro:{
nombre:"Sombrero",
img:"img/hat.png",
desc:"Objeto raro de colección"
},

epico:{
nombre:"Explosión",
img:"img/explosion.png",
desc:"Poder épico devastador"
}

}

let inventario={}

function login(){

jugador=document.getElementById("nombre").value

if(jugador=="") return

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("perfil").style.display="block"

document.getElementById("player").innerText=jugador

document.getElementById("fotoJugador").src=jugadoresImg[jugador]

cargarInventario()

}

function tirar(num){

for(let i=0;i<num;i++){

pity++

let rareza="comun"

let r=Math.random()*100

if(r>80) rareza="raro"
if(r>98) rareza="epico"

if(pity>=30){

rareza="epico"
pity=0

}

mostrarResultado(rareza)
agregarInventario(rareza)

}

guardarInventario()

}

function mostrarResultado(rareza){

let obj=objetos[rareza]

let tabla=document.getElementById("tablaResultados")

let fila=document.createElement("tr")

fila.innerHTML=`

<td>${rareza}</td>
<td>
<img src="${obj.img}" width="40">
<br>
${obj.nombre}
</td>
<td>${obj.desc}</td>

`

tabla.appendChild(fila)

crearParticulas(rareza)

if(rareza=="epico"){
document.getElementById("epic").play()
}else{
document.getElementById("open").play()
}

animarCofre()

}

function animarCofre(){

let cofre=document.getElementById("cofre")

cofre.classList.add("abriendo")

setTimeout(()=>{
cofre.classList.remove("abriendo")
},400)

}

function crearParticulas(rareza){

let simbolo="✨"

if(rareza=="raro") simbolo="⭐"
if(rareza=="epico") simbolo="💥"

for(let i=0;i<8;i++){

let p=document.createElement("div")

p.className="particula"
p.innerHTML=simbolo

p.style.left=(window.innerWidth/2+Math.random()*100-50)+"px"
p.style.top="200px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

function agregarInventario(rareza){

let nombre=objetos[rareza].nombre

if(!inventario[nombre]) inventario[nombre]=0

inventario[nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Objeto</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

function guardarInventario(){

localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))

}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){

inventario=JSON.parse(data)
actualizarTabla()

}

}

</script>

</body>
</html>
