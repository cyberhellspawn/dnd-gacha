<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Official Gaoth Gacha</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#336b8a;
}

/* LOGIN */

#login{
margin-top:40px;
}

#game{
display:none;
}

/* COFRE */

#cofre{
width:200px;
cursor:pointer;
transition:transform 0.4s;
}

.abriendo{
transform:scale(1.2) rotate(5deg);
}

/* CATALOGO */

.catalogo{
margin-top:30px;
display:flex;
justify-content:center;
gap:40px;
}

.item{
text-align:center;
position:relative;
}

.item img{
width:80px;
}

/* tooltip */

.tooltip{
visibility:hidden;
background:#222;
color:white;
padding:6px;
border-radius:6px;
position:absolute;
bottom:110%;
left:50%;
transform:translateX(-50%);
font-size:12px;
width:150px;
}

.item:hover .tooltip{
visibility:visible;
}

/* INVENTARIO */

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:8px 14px;
}

/* PARTICULAS */

.particula{
position:absolute;
font-size:24px;
animation:subir 1s ease-out forwards;
}

@keyframes subir{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-100px)}
}

</style>
</head>

<body>

<h1>Gaoth Gacha</h1>

<h3>Probabilidades</h3>

<p>Epico 2% &nbsp;&nbsp;&nbsp; Raro 18% &nbsp;&nbsp;&nbsp; Comun 80%</p>

<div id="login">

<input id="nombre" placeholder="nombre del jugador">
<button onclick="login()">Entrar</button>

</div>

<div id="game">

<h3 id="player"></h3>

<br>

<button onclick="cambiarCofre('normal')">Cofre Normal</button>
<button onclick="cambiarCofre('valentine')">Cofre Valentine</button>

<br><br>

<img id="cofre" src="img/chest.png">

<br><br>

<button onclick="tirar(1)">Abrir x1</button>
<button onclick="tirar(10)">Abrir x10</button>

<h2>Resultado</h2>

<div id="resultado"></div>

<hr>

<h2>Catálogo</h2>

<div id="catalogo"></div>

<hr>

<h2>Inventario</h2>

<table id="inventarioTabla">
<tr>
<th>Item</th>
<th>Cantidad</th>
</tr>
</table>

</div>

<audio id="open" src="sound/open.mp3"></audio>
<audio id="epic" src="sound/epic.mp3"></audio>

<audio id="paper" src="sound/paper.mp3"></audio>
<audio id="kiss" src="sound/kiss.mp3"></audio>

<script>

let jugador=""
let tipoCofre="normal"

let items=[]

const cofres={

normal:{
imagen:"img/chest.png",
comun:"img/candy.png",
raro:"img/hat.png",
epico:"img/explosion.png",
csv:"list/common.csv",
sonido:"open",
sonidoEpico:"epic",
fondo:"#f5e6c8"
},

valentine:{
imagen:"img/heartbox.png",
comun:"img/hand.png",
raro:"img/star.png",
epico:"img/heart.png",
csv:"list/valentine.csv",
sonido:"paper",
sonidoEpico:"kiss",
fondo:"#ffe6f0"
}

}

let inventario={}

/* LOGIN */

function login(){

let nombre=document.getElementById("nombre").value
if(nombre=="") return

jugador=nombre

document.getElementById("player").innerText="Jugador: "+jugador

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

cargarInventario()

}

/* CAMBIAR COFRE */

async function cambiarCofre(tipo){

tipoCofre=tipo

document.getElementById("cofre").src=cofres[tipo].imagen
document.body.style.background=cofres[tipo].fondo

await cargarCSV()

generarCatalogo()

}

/* CARGAR CSV */

async function cargarCSV(){

let res=await fetch(cofres[tipoCofre].csv)
let text=await res.text()

let lineas=text.split("\n")

items=[]

for(let i=1;i<lineas.length;i++){

let cols=lineas[i].split(",")

if(cols.length<3) continue

items.push({

rareza:cols[0].trim().toLowerCase(),
nombre:cols[1].trim(),
descripcion:cols[2].trim()

})

}

}

/* TIRADAS */

function tirar(num){

document.getElementById("resultado").innerHTML=""

for(let i=0;i<num;i++){

let r=Math.random()*100
let rareza="comun"

if(r>80) rareza="raro"
if(r>98) rareza="epico"

let pool=items.filter(x=>x.rareza==rareza)

let item=pool[Math.floor(Math.random()*pool.length)]

mostrarResultado(item)

agregarInventario(item)

}

guardarInventario()

}

/* RESULTADO */

function mostrarResultado(item){

let img=document.createElement("img")

img.src=cofres[tipoCofre][item.rareza]

img.title=item.descripcion

document.getElementById("resultado").appendChild(img)

crearParticulas(item.rareza)

if(item.rareza=="epico"){
document.getElementById(cofres[tipoCofre].sonidoEpico).play()
}else{
document.getElementById(cofres[tipoCofre].sonido).play()
}

animarCofre()

}

/* ANIMACION */

function animarCofre(){

let cofre=document.getElementById("cofre")

cofre.classList.add("abriendo")

setTimeout(()=>{
cofre.classList.remove("abriendo")
},400)

}

/* PARTICULAS */

function crearParticulas(rareza){

let simbolo="?"

if(rareza=="raro") simbolo="?"
if(rareza=="epico") simbolo="??"

for(let i=0;i<8;i++){

let p=document.createElement("div")
p.className="particula"
p.innerHTML=simbolo

p.style.left=(window.innerWidth/2+Math.random()*100-50)+"px"
p.style.top="200px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

/* CATALOGO */

function generarCatalogo(){

let c=document.getElementById("catalogo")

let comun=items.filter(i=>i.rareza=="comun")[0]
let raro=items.filter(i=>i.rareza=="raro")[0]
let epico=items.filter(i=>i.rareza=="epico")[0]

c.innerHTML=`

<img src="${cofres[tipoCofre].imagen}" width="120">

<div class="catalogo">

<div class="item">

<img src="${cofres[tipoCofre].comun}">
<p>${comun.nombre}</p>
<div class="tooltip">${comun.descripcion}</div>

</div>

<div class="item">

<img src="${cofres[tipoCofre].raro}">
<p>${raro.nombre}</p>
<div class="tooltip">${raro.descripcion}</div>

</div>

<div class="item">

<img src="${cofres[tipoCofre].epico}">
<p>${epico.nombre}</p>
<div class="tooltip">${epico.descripcion}</div>

</div>

</div>
`

}

/* INVENTARIO */

function agregarInventario(item){

if(!inventario[item.nombre]){
inventario[item.nombre]=0
}

inventario[item.nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Item</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

/* GUARDAR */

function guardarInventario(){

localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))

}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){
inventario=JSON.parse(data)
actualizarTabla()
}

}

</script>

</body>
</html>
