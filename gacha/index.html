<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gaoth Gacha</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#ffe6f0;
}

/* LOGIN */

#login{
margin-top:40px;
}

#game{
display:none;
}

/* COFRE */

#cofre{
width:200px;
cursor:pointer;
transition:transform 0.4s;
}

.abriendo{
transform:scale(1.2) rotate(5deg);
}

/* CATALOGO */

.catalogo{
margin-top:30px;
display:flex;
justify-content:center;
gap:40px;
}

.item{
text-align:center;
}

.item img{
width:80px;
}

/* INVENTARIO */

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:8px 14px;
}

/* PARTICULAS */

.particula{
position:absolute;
font-size:24px;
animation:subir 1s ease-out forwards;
}

@keyframes subir{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-100px)}
}

</style>
</head>

<body>

<h1>Gaoth Gacha</h1>

<h3>Probabilidades</h3>

<p>Épico 2% &nbsp;&nbsp;&nbsp; Raro 18% &nbsp;&nbsp;&nbsp; Común 80%</p>


<!-- LOGIN -->

<div id="login">

<input id="nombre" placeholder="nombre jugador">
<button onclick="login()">Entrar</button>

</div>


<!-- JUEGO -->

<div id="game">

<h3 id="player"></h3>

<br>

<button onclick="cambiarCofre('normal')">Cofre Normal</button>
<button onclick="cambiarCofre('valentine')">Cofre Valentine</button>

<br><br>

<img id="cofre" src="img/chest.png">

<br><br>

<button onclick="tirar(1)">Abrir x1</button>
<button onclick="tirar(10)">Abrir x10</button>

<h2>Resultado</h2>

<div id="resultado"></div>

<hr>

<h2>Catálogo</h2>

<div id="catalogo"></div>

<hr>

<h2>Inventario</h2>

<table id="inventarioTabla">
<tr>
<th>Item</th>
<th>Cantidad</th>
</tr>
</table>

</div>

<!-- SONIDOS -->

<audio id="open" src="sound/open.mp3"></audio>
<audio id="epic" src="sound/epic.mp3"></audio>

<audio id="paper" src="sound/paper.mp3"></audio>
<audio id="kiss" src="sound/kiss.mp3"></audio>

<script>

<script>

let jugador=""
let tipoCofre="normal"

let inventario={}

let items={
normal:[],
valentine:[]
}

const cofres={

normal:{
imagen:"img/chest.png",
comun:"img/candy.png",
raro:"img/hat.png",
epico:"img/explosion.png",
sonido:"open",
sonidoEpico:"epic",
fondo:"#f5e6c8"
},

valentine:{
imagen:"img/heartbox.png",
comun:"img/hand.png",
raro:"img/star.png",
epico:"img/heart.png",
sonido:"paper",
sonidoEpico:"kiss",
fondo:"#ffe6f0"
}

}

function login(){

let nombre=document.getElementById("nombre").value

if(nombre=="") return

jugador=nombre

document.getElementById("player").innerText="Jugador: "+jugador

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

cargarInventario()

}

function cambiarCofre(tipo){

tipoCofre=tipo

document.getElementById("cofre").src=cofres[tipo].imagen

document.body.style.background=cofres[tipo].fondo

generarCatalogo()

}

/* ===========================
CARGAR CSV
=========================== */

async function cargarCSV(){

items.normal = await leerCSV("list/common.csv")
items.valentine = await leerCSV("list/valentine.csv")

generarCatalogo()

}

async function leerCSV(ruta){

let res=await fetch(ruta)
let texto=await res.text()

let lineas=texto.split("\n")

let resultado=[]

for(let i=1;i<lineas.length;i++){

let partes=lineas[i].split(",")

if(partes.length<3) continue

resultado.push({

rareza:partes[0].trim(),
nombre:partes[1].trim(),
descripcion:partes[2].trim()

})

}

return resultado

}

/* ===========================
TIRADAS
=========================== */

function tirar(num){

document.getElementById("resultado").innerHTML=""

for(let i=0;i<num;i++){

let r=Math.random()*100
let rareza="comun"

if(r>80) rareza="raro"
if(r>98) rareza="epico"

let lista=items[tipoCofre].filter(i=>i.rareza==rareza)

let premio=lista[Math.floor(Math.random()*lista.length)]

mostrarResultado(premio)

agregarInventario(premio)

}

guardarInventario()

}

function mostrarResultado(item){

let img=document.createElement("img")

img.src=cofres[tipoCofre][item.rareza]

img.title=item.nombre+" - "+item.descripcion

document.getElementById("resultado").appendChild(img)

crearParticulas(item.rareza)

if(item.rareza=="epico"){

}

function animarCofre(){

let cofre=document.getElementById("cofre")

cofre.classList.add("abriendo")

setTimeout(()=>{
cofre.classList.remove("abriendo")
},400)

}

/* ===========================
PARTICULAS
=========================== */

function crearParticulas(rareza){

let simbolo="?"

if(rareza=="raro") simbolo="?"
if(rareza=="epico") simbolo="??"

for(let i=0;i<10;i++){

let p=document.createElement("div")

p.className="particula"

p.innerHTML=simbolo

p.style.left=(window.innerWidth/2+Math.random()*100-50)+"px"

p.style.top="200px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

/* ===========================
CATALOGO
=========================== */

function generarCatalogo(){

let lista=items[tipoCofre]

let html=`<img src="${cofres[tipoCofre].imagen}" width="120"><div class="catalogo">`

for(let item of lista){

html+=`

<div class="item">

<img src="${cofres[tipoCofre][item.rareza]}">

<p>${item.nombre}</p>

<p>${item.rareza}</p>

</div>

`

}

html+="</div>"

document.getElementById("catalogo").innerHTML=html

}

/* ===========================
INVENTARIO
=========================== */

function agregarInventario(item){

let nombre=item.nombre

if(!inventario[nombre]){
inventario[nombre]=0
}

inventario[nombre]++

actualizarTabla()

}

function actualizarTabla(){

let tabla=document.getElementById("inventarioTabla")

tabla.innerHTML="<tr><th>Item</th><th>Cantidad</th></tr>"

for(let item in inventario){

let fila=document.createElement("tr")

fila.innerHTML="<td>"+item+"</td><td>"+inventario[item]+"</td>"

tabla.appendChild(fila)

}

}

function guardarInventario(){

localStorage.setItem("inventario_"+jugador,JSON.stringify(inventario))

}

function cargarInventario(){

let data=localStorage.getItem("inventario_"+jugador)

if(data){

inventario=JSON.parse(data)

actualizarTabla()

}

}

cargarCSV()

</script>
</script>

</body>
</html>
